# Install on the server as /etc/nginx/sites-available/kwh and symlink to sites-enabled.
# TLS on port 1000 — browsers require HTTPS (or localhost) for getUserMedia / camera.

server {
    listen 1000 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/kwh.crt;
    ssl_certificate_key /etc/nginx/ssl/kwh.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Browsers that open http://host:1000 hit TLS with cleartext; nginx returns 497.
    # Redirect to HTTPS on the same port so users are not stuck on a 400 page.
    error_page 497 https://$host:1000$request_uri;

    root /var/www/kwh-face-app/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        client_max_body_size 32m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
